apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: uber

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: thesanketpawar/uber-frontend:v2

        imagePullPolicy: Always

        ports:
        - containerPort: 80