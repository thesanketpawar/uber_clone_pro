apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: uber
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: thesanketpawar/uber-frontend:v2
        ports:
        - containerPort: 3000
        env:
        - name: VITE_BASE_URL
          value: "http://backend.uber.svc.cluster.local:4000"
